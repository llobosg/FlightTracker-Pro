<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FlightTracker Pro</title>
  <link rel="manifest" href="/public/manifest.json">
  <link rel="apple-touch-icon" href="/public/assets/images/icons/icon-192x192.png">
  <link rel="stylesheet" href="/public/assets/css/styles.css">
  <style>
    /* Estilos críticos inline para carga rápida */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      min-height: 100vh;
      padding: 16px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    .card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 12px;
    }
    .input {
      width: 100%;
      padding: 14px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: white;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .input:focus { outline: none; border-color: #3b82f6; }
    .hidden { display: none; }
    .logo { text-align: center; margin: 32px 0 24px; }
    .logo h1 { font-size: 24px; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>✈️ FlightTracker Pro</h1>
      <p style="color: #94a3b8; margin-top: 4px;">Tu agenda de vuelos, siempre contigo</p>
    </div>

    <!-- Formulario de Registro -->
    <div id="register-form" class="card">
      <h2 style="margin-bottom: 16px;">Crear cuenta</h2>
      <input type="text" id="reg-name" class="input" placeholder="Nombre completo" required>
      <input type="email" id="reg-email" class="input" placeholder="Correo electrónico" required>
      <input type="password" id="reg-pass" class="input" placeholder="Contraseña (mín. 6 caracteres)" minlength="6" required>
      <button class="btn" onclick="register()">Registrarse</button>
      <p style="text-align: center; margin-top: 16px; color: #94a3b8; font-size: 14px;">
        ¿Ya tienes cuenta? <a href="#" onclick="showLogin()" style="color: #60a5fa;">Iniciar sesión</a>
      </p>
    </div>

    <!-- Formulario de Login -->
    <div id="login-form" class="card hidden">
      <h2 style="margin-bottom: 16px;">Iniciar sesión</h2>
      <input type="email" id="login-email" class="input" placeholder="Correo electrónico" required>
      <input type="password" id="login-pass" class="input" placeholder="Contraseña" required>
      <button class="btn" onclick="login()">Ingresar</button>
      <p style="text-align: center; margin-top: 16px; color: #94a3b8; font-size: 14px;">
        ¿Olvidaste tu contraseña? <a href="#" style="color: #60a5fa;">Recuperar</a>
      </p>
    </div>

    <!-- Verificación -->
    <div id="verify-form" class="card hidden">
      <h2 style="margin-bottom: 16px;">Verificar correo</h2>
      <p style="color: #94a3b8; margin-bottom: 16px;">Ingresa el código de 6 dígitos enviado a <span id="verify-email" style="color: #60a5fa;"></span></p>
      <input type="text" id="verify-code" class="input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" style="text-align: center; letter-spacing: 8px; font-size: 20px;" required>
      <button class="btn" onclick="verifyCode()">Verificar</button>
      <p style="text-align: center; margin-top: 12px;">
        <a href="#" onclick="resendCode()" style="color: #60a5fa; font-size: 14px;">Reenviar código</a>
      </p>
    </div>

    <!-- Dashboard (placeholder) -->
    <div id="dashboard" class="hidden">
      <div class="card">
        <h3>👋 Bienvenido</h3>
        <p style="color: #94a3b8; margin-top: 8px;">Tu próximo vuelo aparecerá aquí...</p>
      </div>
      <button class="btn" onclick="logout()" style="background: linear-gradient(135deg, #ef4444, #f97316);">Cerrar sesión</button>
    </div>
  </div>

  <script>
    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/public/sw.js')
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(err => console.log('SW error:', err));
    }

    // Estado de la app
    let currentUser = null;
    const API = window.location.origin + '/api/v1';

    // Navegación entre vistas
    function showView(viewId) {
      ['register-form', 'login-form', 'verify-form', 'dashboard'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
      document.getElementById(viewId).classList.remove('hidden');
    }

    function showLogin() { showView('login-form'); }
    
    // Registro
    async function register() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-pass').value;
      
      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          document.getElementById('verify-email').textContent = email;
          currentUser = { email, tempId: data.user_id };
          showView('verify-form');
        } else {
          alert(data.message || 'Error en registro');
        }
      } catch (e) {
        alert('Error de conexión. Verifica tu internet.');
      }
    }

    // Verificación
    async function verifyCode() {
      const code = document.getElementById('verify-code').value;
      
      try {
        const res = await fetch(`${API}/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentUser.email, code })
        });
        const data = await res.json();
        
        if (res.ok) {
          alert('✅ Cuenta verificada. Ahora puedes iniciar sesión.');
          showView('login-form');
        } else {
          alert(data.message || 'Código inválido o expirado');
        }
      } catch (e) {
        alert('Error de conexión');
      }
    }

    // Login
    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-pass').value;
      
      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showView('dashboard');
        } else {
          alert(data.message || 'Credenciales inválidas');
        }
      } catch (e) {
        alert('Error de conexión');
      }
    }

    function logout() {
      localStorage.clear();
      location.reload();
    }

    function resendCode() {
      alert('📧 Código reenviado (simulación)');
    }

    // Auto-login si hay token
    if (localStorage.getItem('token')) {
      showView('dashboard');
    }
  </script>
</body>
</html>
